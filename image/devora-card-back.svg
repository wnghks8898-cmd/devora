<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Noto+Sans+KR:wght@300;400;700&amp;family=Noto+Serif+KR:wght@500&amp;display=swap');
    </style>
    <pattern id="grid2" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="rgba(21,101,192,0.10)" stroke-width="1"/>
    </pattern>
    <radialGradient id="gridMask2" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </radialGradient>
    <mask id="gridFade2">
      <rect width="900" height="500" fill="url(#gridMask2)"/>
    </mask>
    <linearGradient id="accentLine2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="50%" stop-color="#4aaae0"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#f0f7ff" rx="12"/>
  <rect width="900" height="500" fill="url(#grid2)" mask="url(#gridFade2)" opacity="0.5" rx="12"/>

  <!-- Accent line top -->
  <rect width="900" height="2" fill="url(#accentLine2)" opacity="0.8"/>

  <!-- Header: DEVORA brand -->
  <text x="36" y="65" font-family="'Bebas Neue', sans-serif" font-size="30" letter-spacing="8" fill="#1565C0">DEVORA</text>

  <!-- Tag -->
  <rect x="750" y="38" width="118" height="30" rx="4" fill="rgba(255,255,255,0.6)" stroke="rgba(21,101,192,0.15)" stroke-width="1"/>
  <circle cx="764" cy="53" r="4" fill="#1565C0"/>
  <text x="774" y="57" font-family="'Noto Sans KR', sans-serif" font-size="12" font-weight="700" fill="#5a7a9a" letter-spacing="2">맞춤 제작 스튜디오</text>

  <!-- Name -->
  <text x="36" y="210" font-family="'Noto Serif KR', serif" font-size="72" font-weight="500" fill="#0d1b2a">김주환</text>

  <!-- Role -->
  <text x="36" y="248" font-family="'Noto Sans KR', sans-serif" font-size="16" font-weight="400" fill="#5a7a9a" letter-spacing="2">Founder · DEVORA · 맞춤형 웹 · 앱 · 자동화 · 시스템</text>

  <!-- Divider lines -->
  <rect x="36" y="270" width="828" height="1" fill="rgba(21,101,192,0.15)"/>
  <rect x="36" y="390" width="828" height="1" fill="rgba(21,101,192,0.15)"/>

  <!-- Contact rows -->
  <text x="36" y="305" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#1565C0" letter-spacing="3">PHONE</text>
  <text x="116" y="305" font-family="'Noto Sans KR', sans-serif" font-size="18" fill="#0d1b2a">010-6402-7932</text>

  <text x="36" y="340" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#1565C0" letter-spacing="3">EMAIL</text>
  <text x="116" y="340" font-family="'Noto Sans KR', sans-serif" font-size="18" fill="#0d1b2a">wnghks8898@gmail.com</text>

  <text x="36" y="375" font-family="'Noto Sans KR', sans-serif" font-size="13" font-weight="700" fill="#1565C0" letter-spacing="3">WEB</text>
  <text x="116" y="375" font-family="'Noto Sans KR', sans-serif" font-size="18" fill="#0d1b2a">devora-ten.vercel.app</text>

  <!-- Footer -->
  <text x="36" y="455" font-family="'Noto Sans KR', sans-serif" font-size="16" font-weight="300" fill="#8aabcc" letter-spacing="2">기획부터 납품까지, 한 번에.</text>
  <text x="836" y="455" font-family="'Bebas Neue', sans-serif" font-size="18" fill="#1565C0" opacity="0.4">[ DEV ]</text>
</svg>