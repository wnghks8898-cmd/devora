<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVORA — Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #f0f7ff;
    --border:     rgba(21,101,192,0.15);
    --blue:       #1565C0;
    --blue-glow:  rgba(21,101,192,0.22);
    --sky:        #4aaae0;
    --navy:       #0d1b2a;
    --text:       #0d1b2a;
    --muted:      #5a7a9a;
    --sub:        #8aabcc;
    --card-shadow: 0 32px 72px rgba(10,20,40,.28), 0 6px 20px rgba(10,20,40,.16);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 60px 24px 80px;
    background:
      radial-gradient(ellipse 70% 50% at 10% 0%, rgba(21,101,192,.12) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 90% 100%, rgba(74,170,224,.09) 0%, transparent 55%),
      linear-gradient(160deg, #e8f2fd 0%, #dce8f7 50%, #d4e2f3 100%);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
  }
  .stage { width: min(1060px, 100%); }

  /* Headline */
  .headline { text-align: center; margin-bottom: 40px; animation: fadeUp .55s ease both; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border: 1px solid var(--blue); border-radius: 100px;
    font-size: 11px; font-weight: 700; color: var(--blue); letter-spacing: .12em; margin-bottom: 14px;
  }
  .badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 var(--blue-glow); }
    50%      { box-shadow: 0 0 0 7px transparent; }
  }
  .headline h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px,5vw,56px); letter-spacing: 3px; color: var(--navy); line-height: 1; }
  .headline h1 span { color: var(--blue); }
  .headline p { margin-top: 10px; font-size: 13px; color: var(--muted); letter-spacing: .04em; }

  /* Cards */
  .cards { display: grid; grid-template-columns: 1fr; gap: 28px; max-width: 480px; margin: 0 auto; }
  .card {
    position: relative; aspect-ratio: 1.8/1; border-radius: 12px; overflow: hidden;
    box-shadow: var(--card-shadow);
    transition: transform .38s cubic-bezier(.22,.8,.22,1), box-shadow .38s ease;
    animation: revealCard .7s cubic-bezier(.22,.8,.22,1) both;
  }
  .card:nth-child(1) { animation-delay: .1s; }
  .card:nth-child(2) { animation-delay: .22s; }
  .card:hover { transform: translateY(-7px) scale(1.013); box-shadow: 0 50px 100px rgba(10,20,40,.34), 0 10px 28px rgba(10,20,40,.18); }

  /* FRONT */
  .card-front { background: var(--navy); border: 1px solid rgba(74,170,224,.12); }
  .card-front::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(21,101,192,.18) 1px, transparent 1px), linear-gradient(90deg,rgba(21,101,192,.18) 1px,transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 30%, transparent 100%);
    z-index: 0;
  }
  .card-front::after {
    content: ''; position: absolute; top: -20%; right: -10%; width: 55%; height: 130%;
    background: radial-gradient(ellipse, rgba(21,101,192,.24) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .front-accent-line {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue), var(--sky), transparent);
    opacity: .7; z-index: 2;
  }
  .front-inner {
    position: relative; z-index: 1; height: 100%;
    padding: 35px 34px 35px 38px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .logo-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
  .logo-svg { display: block; width: min(196px,100%); height: auto; }
  .front-ambient { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; opacity: .2; flex-shrink: 0; padding-bottom: 4px; }
  .front-ambient-bar { height: 1px; background: var(--sky); border-radius: 1px; }
  .front-rule { margin-top: 12px; width: 100%; height: 1px; background: linear-gradient(90deg,rgba(74,170,224,.3),transparent); }
  .front-copy { display: grid; gap: 6px; }
  .front-label { display: inline-flex; align-items: center; gap: 7px; font-size: 9px; font-weight: 700; letter-spacing: .2em; color: var(--sky); text-transform: uppercase; }
  .front-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(34px,4.5vw,46px); letter-spacing: 2px; line-height: 1.0; color: #e8f2fd; }
  .front-title span { color: var(--sky); }
  .front-sub { font-size: 10.5px; font-weight: 300; color: rgba(138,171,204,.65); letter-spacing: .04em; line-height: 1.8; }

  /* BACK */
  .card-back { background: var(--bg); border: 1px solid var(--border); }
  .card-back::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 100%);
    opacity: .5; z-index: 0;
  }
  .back-accent-line {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--sky), transparent);
    opacity: .8; z-index: 2;
  }
  .back-inner {
    position: relative; z-index: 1; height: 100%;
    padding: 22px 32px 22px 36px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .back-header { display: flex; align-items: center; justify-content: space-between; }
  .back-brand { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: .26em; color: var(--blue); }
  .back-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: .12em;
    background: rgba(255,255,255,.6);
  }
  .back-tag::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--blue); animation: pulse 2s infinite; }

  /* 이름: Noto Serif KR */
  .identity-name { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 500; letter-spacing: -.01em; color: var(--navy); line-height: 1.05; }
  .identity-role { margin-top: 4px; font-size: 10px; font-weight: 400; color: var(--muted); letter-spacing: .08em; line-height: 1.6; }
  .role-sep { display: inline-block; width: 3px; height: 3px; border-radius: 50%; background: var(--blue); vertical-align: middle; margin: 0 6px; position: relative; top: -1px; }

  .contact { display: grid; gap: 6px; padding: 10px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .contact-row { display: grid; grid-template-columns: 40px 1fr; gap: 10px; align-items: center; }
  .c-key { font-size: 8px; font-weight: 700; letter-spacing: .2em; color: var(--blue); text-transform: uppercase; }
  .c-val { font-size: 11px; font-weight: 400; color: var(--text); letter-spacing: .02em; }

  .back-footer { display: flex; align-items: center; justify-content: space-between; }
  .back-footer-text { font-size: 9.5px; font-weight: 300; color: var(--sub); letter-spacing: .06em; }
  .back-mark { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: .08em; color: var(--blue); opacity: .4; }

  .guide { text-align: center; margin-top: 22px; font-size: 12px; color: var(--sub); letter-spacing: .05em; animation: fadeUp .6s .4s ease both; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes revealCard { from { opacity:0; transform:translateY(24px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }

  @media (max-width: 820px) { .cards { grid-template-columns: 1fr; max-width: 460px; } .front-title { font-size: 38px; } }
  @media print {
    body { padding: 0; background: #fff; } .headline, .guide { display: none; } .stage { width: 100%; }
    .cards { gap: 10mm; justify-items: center; }
    .card { width: 90mm; aspect-ratio: 90/50; border-radius: 0; box-shadow: none; break-inside: avoid; }
  }
</style>
</head>
