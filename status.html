<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 진행현황 — DEVORA</title>
  <link rel="icon" type="image/svg+xml" href="symbol.svg">
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f0f7ff;--bg2:#e2effc;--bg3:#ddeaf8;--card:#ffffff;--border:rgba(21,101,192,0.12);--green:#1565C0;--green-dim:rgba(21,101,192,0.08);--text:#0d1b2a;--muted:#5a7a9a;--sub:#8aabcc;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);pointer-events:none;}

  .wrap{width:100%;max-width:520px;position:relative;z-index:1;}

  /* 헤더 */
  .logo{text-align:center;margin-bottom:4px;display:flex;justify-content:center;}
  .logo-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:36px;}

  /* 검색 박스 */
  .search-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;}
  .search-label{font-size:11px;letter-spacing:3px;color:var(--green);text-transform:uppercase;margin-bottom:10px;}
  .search-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:6px;}
  .search-desc{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7;}
  .search-input{width:100%;padding:14px 16px;background:#f0f7ff;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;letter-spacing:1px;margin-bottom:12px;}
  .search-input:focus{border-color:var(--green);}
  .search-btn{width:100%;padding:13px;background:var(--green);color:#ffffff;font-weight:700;font-size:15px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;}
  .search-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .search-error{font-size:12px;color:#ff6b6b;text-align:center;margin-top:10px;display:none;}

  /* 결과 카드 */
  .result-card{display:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;margin-top:16px;}
  .result-id{font-family:monospace;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .result-name{font-size:20px;font-weight:700;margin-bottom:4px;}
  .result-service{font-size:13px;color:var(--muted);margin-bottom:24px;}

  /* 프로그레스 */
  .stage-list{display:flex;flex-direction:column;gap:0;}
  .stage-item{display:flex;align-items:flex-start;gap:16px;padding:14px 0;position:relative;}
  .stage-item:not(:last-child)::after{content:'';position:absolute;left:15px;top:42px;bottom:0;width:1px;background:var(--border);}
  .stage-item.done::after{background:var(--green);}

  .stage-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;background:rgba(21,101,192,0.08);}
  .stage-item.done .stage-dot{background:var(--green);border-color:var(--green);color:#fff;font-weight:700;}
  .stage-item.current .stage-dot{border-color:var(--green);background:rgba(21,101,192,0.15);color:var(--green);animation:pulse 1.5s infinite;font-weight:700;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(21,101,192,0.3);}50%{box-shadow:0 0 0 6px transparent;}}

  .stage-info{padding-top:4px;}
  .stage-name{font-size:14px;font-weight:600;margin-bottom:3px;}
  .stage-item.done .stage-name{color:var(--green);}
  .stage-item.current .stage-name{color:var(--green);}
  .stage-item:not(.done):not(.current) .stage-name{color:var(--sub);}
  .stage-desc{font-size:12px;color:var(--muted);}

  /* 메모 */
  .memo-box{margin-top:20px;padding:16px;background:var(--green-dim);border:1px solid rgba(21,101,192,0.2);border-radius:8px;}
  .memo-label{font-size:11px;color:var(--green);margin-bottom:6px;font-weight:600;}
  .memo-text{font-size:13px;color:var(--text);line-height:1.8;}

  /* 하단 */
  .bottom-info{margin-top:20px;text-align:center;}
  .bottom-info a{display:inline-block;margin-top:10px;padding:10px 22px;background:#FEE500;color:#000;font-weight:700;font-size:13px;text-decoration:none;border-radius:6px;}
  .back-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;margin-top:14px;display:block;width:100%;text-align:center;}
  .back-btn:hover{color:var(--green);}

  .footer-link{text-align:center;margin-top:28px;font-size:12px;color:var(--sub);}
  .footer-link a{color:var(--sub);text-decoration:none;}
  .footer-link a:hover{color:var(--green);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><svg style="height:26px;width:auto;display:block;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 298.77 53">
  <defs>
    <style>
      .cls-1, .cls-2 {
        fill: #1c61ae;
      }

      .cls-3 {
        fill: #4aaae0;
      }

      .cls-4 {
        fill: none;
        stroke: #1a3060;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 6px;
      }

      .cls-5 {
        fill: #2f73ba;
      }

      .cls-2 {
        fill-rule: evenodd;
      }

      .cls-6 {
        fill: #cfddef;
      }
    </style>
  </defs>
  <path class="cls-2" d="M67.77,3h15c11,0,19,8,19,18s-8,18-19,18h-15V3ZM74.77,10v24h7c6.5,0,11.5-5,11.5-12s-5-12-11.5-12h-7Z"/>
  <path class="cls-1" d="M109.77,3h26v7h-19v8h17v7h-17v9h19v7h-26V3Z"/>
  <path class="cls-1" d="M139.77,3h8l11,27,11-27h8l-15,36h-11l-12-36Z"/>
  <circle class="cls-3" cx="177.77" cy="4" r="4"/>
  <path class="cls-2" d="M181.77,21c0-10.5,8-19.5,19.5-19.5s19.5,9,19.5,19.5-8,19.5-19.5,19.5-19.5-9-19.5-19.5ZM188.77,21c0,7,5.5,12.5,12.5,12.5s12.5-5.5,12.5-12.5-5.5-12.5-12.5-12.5-12.5,5.5-12.5,12.5Z"/>
  <path class="cls-2" d="M225.77,3h16c7.5,0,13,5,13,12,0,5-2.5,9-7,11l8,13h-8l-7-13h-7v13h-8V3ZM233.77,10v9.5h7.5c3.5,0,5.5-2,5.5-4.75s-2-4.75-5.5-4.75h-7.5Z"/>
  <path class="cls-2" d="M261.77,39l15-36h7l15,36h-8l-3-8h-15l-3,8h-8ZM276.27,25h10l-5-14-5,14Z"/>
  <path class="cls-6" d="M70.95,49h96c1.1,0,2,.9,2,2h0c0,1.1-.9,2-2,2h-96c-1.1,0-2-.9-2-2h0c0-1.1.9-2,2-2Z"/>
  <path class="cls-3" d="M69.77,49h32c1.1,0,2,.9,2,2h0c0,1.1-.9,2-2,2h-32c-1.1,0-2-.9-2-2h0c0-1.1.9-2,2-2Z"/>
  <path class="cls-4" d="M20.07,7.2L3,27.6l17.07,20.4"/>
  <path class="cls-4" d="M32.26,7.2l17.07,20.4-17.07,20.4"/>
  <ellipse class="cls-5" cx="26.82" cy="27.02" rx="5.38" ry="4.74"/>
</svg></div>
  <div class="logo-sub">프로젝트 진행현황 조회</div>

  <!-- 검색 -->
  <div class="search-card" id="searchCard">
    <div class="search-label">Status Check</div>
    <h1 class="search-title">진행현황 조회</h1>
    <p class="search-desc">문의 접수 후 발급받은 <strong style="color:var(--green)">접수번호</strong>를 입력해 주세요.</p>
    <input class="search-input" id="idInput" placeholder="DEVA-20250312-143022" onkeydown="if(event.key==='Enter')search()">
    <button class="search-btn" id="searchBtn" onclick="search()">조회하기</button>
    <div class="search-error" id="searchError">접수번호를 찾을 수 없습니다. 다시 확인해 주세요.</div>
  </div>

  <!-- 결과 -->
  <div class="result-card" id="resultCard">
    <div class="result-id" id="r_id"></div>
    <div class="result-name" id="r_name"></div>
    <div class="result-service" id="r_service"></div>

    <div class="stage-list" id="r_stages"></div>

    <div class="memo-box" id="r_memoBox" style="display:none;">
      <div class="memo-label">📝 담당자 메모</div>
      <div class="memo-text" id="r_memo"></div>
    </div>

    <div class="bottom-info">
      <p style="font-size:12px;color:var(--muted)">진행 관련 문의는 카카오톡으로 연락주세요</p>
      <a href="https://open.kakao.com/o/sCdTuSki" target="_blank">💬 카카오톡 문의하기</a>
    </div>
    <button class="back-btn" onclick="goBack()">← 다른 접수번호 조회</button>
  </div>

  <div class="footer-link">
    <a href="index.html">← 홈으로</a>
  </div>
</div>

<script>
  var API_URL = 'https://script.google.com/macros/s/AKfycbyxFFyXgvrMHlBNNOU3u0rYSorHiTkdHPJgaGSvKLgdqmIjaKGdE61S2Q96qHkfPoQ/exec';
  var STAGES = ['접수중','접수완료','입금대기','입금완료','진행중','완료'];
  var STAGE_DESC = {
    '접수중':   '문의가 접수되었습니다. 곧 연락드립니다.',
    '접수완료': '담당자가 문의를 확인했습니다.',
    '입금대기': '견적 및 계약이 완료되었습니다. 착수금 입금을 기다리고 있습니다.',
    '입금완료': '착수금 입금이 확인되었습니다. 개발을 시작합니다.',
    '진행중':   '프로젝트가 활발하게 진행 중입니다.',
    '완료':     '프로젝트가 성공적으로 완료되었습니다. 감사합니다!'
  };

  // URL 파라미터로 자동 조회
  window.onload = function() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    if (id) {
      document.getElementById('idInput').value = id;
      search();
    }
  };

  function search() {
    var id = document.getElementById('idInput').value.trim();
    if (!id) { alert('접수번호를 입력해주세요'); return; }

    var btn = document.getElementById('searchBtn');
    btn.textContent = '조회 중...';
    btn.disabled = true;
    document.getElementById('searchError').style.display = 'none';

    fetch(API_URL + '?action=status&id=' + encodeURIComponent(id), { redirect: 'follow' })
      .then(function(r){ return r.text(); })
      .then(function(text) {
        btn.textContent = '조회하기';
        btn.disabled = false;
        var data;
        try { data = JSON.parse(text); } catch(e) {
          document.getElementById('searchError').textContent = '서버 응답 오류. 잠시 후 다시 시도해 주세요.';
          document.getElementById('searchError').style.display = 'block';
          console.error('GAS response:', text.substring(0, 200));
          return;
        }
        if (data.result !== 'success') {
          document.getElementById('searchError').textContent = '접수번호를 찾을 수 없습니다. 다시 확인해 주세요.';
          document.getElementById('searchError').style.display = 'block';
          return;
        }
        showResult(data);
      })
      .catch(function(err) {
        btn.textContent = '조회하기';
        btn.disabled = false;
        document.getElementById('searchError').textContent = '네트워크 오류. 잠시 후 다시 시도해 주세요.';
        document.getElementById('searchError').style.display = 'block';
        console.error('Fetch error:', err);
      });
  }

  function showResult(data) {
    document.getElementById('r_id').textContent = data.접수번호;
    document.getElementById('r_name').textContent = data.이름 + ' 고객님의 프로젝트';
    document.getElementById('r_service').textContent = '📦 ' + data.서비스 + ' · 접수: ' + data.접수시간;

    var currentIdx = STAGES.indexOf(data.상태);
    var html = '';
    STAGES.forEach(function(s, i) {
      var cls = i < currentIdx ? 'done' : (i === currentIdx ? 'current' : '');
      var icon = i < currentIdx ? '✓' : (i === currentIdx ? '●' : '○');
      html += '<div class="stage-item ' + cls + '">' +
        '<div class="stage-dot">' + icon + '</div>' +
        '<div class="stage-info">' +
          '<div class="stage-name">' + s + '</div>' +
          '<div class="stage-desc">' + (cls ? STAGE_DESC[s] : '') + '</div>' +
        '</div></div>';
    });
    document.getElementById('r_stages').innerHTML = html;

    if (data.메모) {
      document.getElementById('r_memo').textContent = data.메모;
      document.getElementById('r_memoBox').style.display = 'block';
    } else {
      document.getElementById('r_memoBox').style.display = 'none';
    }

    document.getElementById('searchCard').style.display = 'none';
    document.getElementById('resultCard').style.display = 'block';
  }

  function goBack() {
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('searchCard').style.display = 'block';
    document.getElementById('idInput').value = '';
  }
</script>
</body>
</html>
