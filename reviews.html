<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객 후기 전체보기 — DEVORA</title>
<link rel="icon" type="image/svg+xml" href="symbol.svg">
<style>
  :root {
    --bg:#f0f7ff; --bg2:#e2effc; --card:#ffffff;
    --green:#1565C0; --green-dim:rgba(21,101,192,0.08);
    --text:#0d1b2a; --muted:#5a7a9a; --border:rgba(21,101,192,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:rgba(240,247,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;}
  .nav-logo{cursor:pointer;}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .nav-status{font-size:13px;color:var(--muted);text-decoration:none;padding:8px 16px;border-radius:20px;border:1px solid var(--border);transition:all 0.2s;}
  .nav-status:hover{color:var(--green);border-color:var(--green);}
  .nav-cta{background:var(--green);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
  .nav-cta:hover{background:#1254a8;transform:translateY(-1px);}

  /* HEADER */
  .page-header{padding:80px 40px 48px;text-align:center;}
  .page-label{font-size:11px;letter-spacing:3px;color:var(--green);font-weight:600;text-transform:uppercase;margin-bottom:16px;}
  .page-title{font-size:48px;font-weight:800;color:var(--text);margin-bottom:16px;letter-spacing:-1px;}
  .page-sub{color:var(--muted);font-size:16px;}

  /* STATS */
  .stats-bar{display:flex;justify-content:center;gap:48px;margin-bottom:48px;flex-wrap:wrap;}
  .stat-item{text-align:center;}
  .stat-num{font-size:32px;font-weight:800;color:var(--green);display:block;}
  .stat-label{font-size:13px;color:var(--muted);margin-top:4px;}

  /* CONTAINER */
  .container{max-width:1100px;margin:0 auto;padding:0 24px;}

  /* GRID */
  .reviews-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;margin-bottom:80px;}

  /* CARD */
  .review-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;transition:all 0.3s;display:flex;flex-direction:column;}
  .review-card:hover{border-color:rgba(21,101,192,0.25);transform:translateY(-3px);box-shadow:0 8px 32px rgba(21,101,192,0.1);}
  .review-stars{color:var(--green);font-size:14px;letter-spacing:2px;margin-bottom:16px;}
  .review-text{font-size:14px;line-height:1.9;color:var(--text);flex:1;margin-bottom:20px;}
  .review-divider{border:none;border-top:1px solid var(--border);margin-bottom:16px;}
  .review-author{display:flex;align-items:center;gap:12px;}
  .author-avatar{width:40px;height:40px;border-radius:50%;background:var(--green-dim);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
  .author-name{font-size:14px;font-weight:600;}
  .author-role{font-size:12px;color:var(--muted);}
  .review-tag{margin-left:auto;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--green-dim);color:var(--green);}

  /* EMPTY */
  .empty{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1;}

  /* CTA SECTION */
  .cta-section{background:var(--green);color:#fff;text-align:center;padding:64px 40px;margin-bottom:0;}
  .cta-title{font-size:32px;font-weight:800;margin-bottom:16px;}
  .cta-sub{font-size:16px;opacity:0.85;margin-bottom:32px;}
  .cta-btn{display:inline-block;background:#fff;color:var(--green);padding:16px 40px;border-radius:50px;font-size:16px;font-weight:700;text-decoration:none;transition:all 0.2s;}
  .cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.2);}

  /* FOOTER */
  footer{background:var(--bg2);border-top:1px solid var(--border);padding:32px 40px;text-align:center;font-size:13px;color:var(--muted);}

  /* FLOAT */
  .float-kakao{position:fixed;bottom:30px;right:24px;background:#FEE500;color:#3A1D1D;padding:12px 20px;border-radius:50px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:99;transition:all 0.2s;}
  .float-kakao:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.2);}
  .scroll-top{position:fixed;bottom:90px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:18px;cursor:pointer;display:none;z-index:98;box-shadow:0 4px 16px rgba(21,101,192,0.3);}
  .scroll-top.visible{display:flex;align-items:center;justify-content:center;}

  @media(max-width:768px){
    nav{padding:14px 16px;}
    .page-header{padding:60px 20px 32px;}
    .page-title{font-size:32px;}
    .stats-bar{gap:24px;}
    .float-kakao span{display:none;}
    .float-kakao{padding:14px;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><svg style="height:26px;width:auto;display:block;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 298.77 53"><defs><style>.cls-1,.cls-2{fill:#1c61ae}.cls-3{fill:#4aaae0}.cls-4{fill:none;stroke:#1a3060;stroke-linecap:round;stroke-linejoin:round;stroke-width:6px}.cls-5{fill:#2f73ba}.cls-2{fill-rule:evenodd}.cls-6{fill:#cfddef}</style></defs><path class="cls-2" d="M67.77,3h15c11,0,19,8,19,18s-8,18-19,18h-15V3ZM74.77,10v24h7c6.5,0,11.5-5,11.5-12s-5-12-11.5-12h-7Z"/><path class="cls-1" d="M109.77,3h26v7h-19v8h17v7h-17v9h19v7h-26V3Z"/><path class="cls-1" d="M139.77,3h8l11,27,11-27h8l-15,36h-11l-12-36Z"/><circle class="cls-3" cx="177.77" cy="4" r="4"/><path class="cls-2" d="M181.77,21c0-10.5,8-19.5,19.5-19.5s19.5,9,19.5,19.5-8,19.5-19.5,19.5-19.5-9-19.5-19.5ZM188.77,21c0,7,5.5,12.5,12.5,12.5s12.5-5.5,12.5-12.5-5.5-12.5-12.5-12.5-12.5,5.5-12.5,12.5Z"/><path class="cls-2" d="M225.77,3h16c7.5,0,13,5,13,12,0,5-2.5,9-7,11l8,13h-8l-7-13h-7v13h-8V3ZM233.77,10v9.5h7.5c3.5,0,5.5-2,5.5-4.75s-2-4.75-5.5-4.75h-7.5Z"/><path class="cls-2" d="M261.77,39l15-36h7l15,36h-8l-3-8h-15l-3,8h-8ZM276.27,25h10l-5-14-5,14Z"/><path class="cls-6" d="M70.95,49h96c1.1,0,2,.9,2,2h0c0,1.1-.9,2-2,2h-96c-1.1,0-2-.9-2-2h0c0-1.1.9-2,2-2Z"/><path class="cls-3" d="M69.77,49h32c1.1,0,2,.9,2,2h0c0,1.1-.9,2-2,2h-32c-1.1,0-2-.9-2-2h0c0-1.1.9-2,2-2Z"/><path class="cls-4" d="M20.07,7.2L3,27.6l17.07,20.4"/><path class="cls-4" d="M32.26,7.2l17.07,20.4-17.07,20.4"/><ellipse class="cls-5" cx="26.82" cy="27.02" rx="5.38" ry="4.74"/></svg></a>
  <div class="nav-right">
    <a href="status.html" class="nav-status">📋 진행현황 조회</a>
    <a href="index.html#contact" class="nav-cta">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      무료 상담 신청
    </a>
  </div>
</nav>

<div class="page-header">
  <p class="page-label">Reviews</p>
  <h1 class="page-title">고객의 말</h1>
  <p class="page-sub">실제 의뢰인들의 이야기입니다.</p>
</div>

<div class="container">
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num" id="totalCount">-</span><div class="stat-label">총 후기 수</div></div>
    <div class="stat-item"><span class="stat-num">5.0</span><div class="stat-label">평균 별점</div></div>
    <div class="stat-item"><span class="stat-num">100%</span><div class="stat-label">만족도</div></div>
  </div>
  <div class="reviews-grid" id="grid">
    <div class="empty">불러오는 중...</div>
  </div>
</div>

<section class="cta-section">
  <h2 class="cta-title">다음 후기의 주인공이 되세요</h2>
  <p class="cta-sub">지금 바로 무료 상담을 신청하세요.</p>
  <a href="index.html#contact" class="cta-btn">무료 상담 신청하기 →</a>
</section>

<footer>
  <p>© 2026 DEVORA. All rights reserved. &nbsp;·&nbsp; <a href="index.html" style="color:var(--muted);text-decoration:none;">홈으로</a></p>
</footer>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<a href="https://open.kakao.com/o/sCdTuSki" class="float-kakao" target="_blank">
  <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 3C6.477 3 2 6.477 2 11c0 2.89 1.594 5.433 4.023 6.985l-.924 3.468a.25.25 0 0 0 .374.28L9.82 19.26C10.533 19.41 11.258 19.5 12 19.5c5.523 0 10-3.477 10-7.5S17.523 3 12 3z"/></svg>
  <span>카카오 상담</span>
</a>

<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbyxFFyXgvrMHlBNNOU3u0rYSorHiTkdHPJgaGSvKLgdqmIjaKGdE61S2Q96qHkfPoQ/exec';

var DEFAULT_REVIEWS = [
  {id:'r1',name:'(주)아OO',role:'중소기업 직원',tag:'자동화',stars:5,text:'"원하는 요지를 정말 잘 파악해 주셨고 잘만들어 주셨습니다. 무사히 잘 맞춰주셔서 감사합니다. 다음에 또 이용하겠습니다."'},
  {id:'r2',name:'(주)아OO',role:'중소기업 직원',tag:'자동화',stars:5,text:'"작업물결과 만족스럽습니다. 수정요청사항도 잘 피드백 해주시고 생각했던 구성안으로 잘 만들어주셨어요!"'}
];

function loadData() {
  var data = DEFAULT_REVIEWS.slice();
  renderGrid(data);

  // localStorage
  try {
    var local = JSON.parse(localStorage.getItem('devora_reviews') || 'null');
    if (local && local.length) { data = local; renderGrid(data); }
  } catch(e) {}

  // Sheets
  fetch(SHEET_URL + '?action=getReviews', { redirect:'follow' })
    .then(function(r){ return r.text(); })
    .then(function(t){
      try {
        var d = JSON.parse(t);
        if (d.result === 'success' && d.items && d.items.length) {
          renderGrid(d.items);
        }
      } catch(e) {}
    }).catch(function(){});
}

function renderGrid(items) {
  document.getElementById('totalCount').textContent = items.length;
  if (!items.length) {
    document.getElementById('grid').innerHTML = '<div class="empty">아직 후기가 없습니다.</div>';
    return;
  }
  document.getElementById('grid').innerHTML = items.map(function(r) {
    var stars = '★'.repeat(Math.min(5, parseInt(r.stars)||5));
    return '<div class="review-card">' +
      '<div class="review-stars">' + stars + '</div>' +
      '<div class="review-text">' + r.text + '</div>' +
      '<hr class="review-divider">' +
      '<div class="review-author">' +
        '<div class="author-avatar">' + r.name.charAt(0) + '</div>' +
        '<div><div class="author-name">' + r.name + '</div><div class="author-role">' + r.role + '</div></div>' +
        '<span class="review-tag">' + r.tag + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

window.addEventListener('scroll', function(){ document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY>300); });
loadData();
</script>
</body>
</html>
