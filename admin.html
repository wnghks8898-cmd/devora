<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVORA Admin</title>
  <link rel="icon" type="image/svg+xml" href="symbol.svg">
  
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f7ff; --bg2:#e2effc; --bg3:#ddeaf8; --card:#ffffff;
    --border:rgba(21,101,192,0.12); --green:#1565C0;
    --green-dim:rgba(21,101,192,0.08); --text:#0d1b2a; --muted:#5a7a9a; --sub:#8aabcc;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:340px;text-align:center;}
  .login-logo{display:flex;justify-content:center;margin-bottom:8px;}
  .login-sub{font-size:12px;color:var(--muted);margin-bottom:32px;}
  .login-box input{width:100%;padding:13px 16px;background:#f0f7ff;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px;box-sizing:border-box;}
  .login-box input:focus{border-color:var(--green);}
  .login-btn{width:100%;padding:13px;background:var(--green);color:#fff;font-weight:700;font-size:15px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;}
  .login-error{font-size:12px;color:#ef4444;margin-top:10px;display:none;}
  #adminScreen{display:none;}
  .top-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .top-logo{display:flex;align-items:center;gap:8px;}
  .top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .icon-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .icon-btn:hover{border-color:var(--green);color:var(--green);}
  .icon-btn.primary{background:var(--green);color:#fff;border-color:var(--green);font-weight:700;}
  .icon-btn.primary:hover{opacity:0.85;}
  .main{padding:28px;max-width:1200px;margin:0 auto;}
  .stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 22px;text-align:center;}
  .stat-n{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);}
  .stat-l{font-size:11px;color:var(--muted);}
  /* 탭 */
  .admin-tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--border);}
  .admin-tab{background:none;border:none;padding:10px 20px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
  .admin-tab.active{color:var(--green);border-bottom-color:var(--green);}
  .tab-panel{display:none;} .tab-panel.active{display:block;}
  /* 필터 */
  .filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .filter-tab{background:none;border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);transition:all 0.2s;}
  .filter-tab.active,.filter-tab:hover{background:var(--green);color:#fff;border-color:var(--green);}
  .search-input{margin-left:auto;padding:7px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:inherit;outline:none;width:200px;}
  .search-input:focus{border-color:var(--green);}
  /* 테이블 */
  .table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:10px;}
  table{width:100%;border-collapse:collapse;}
  th{padding:12px 16px;font-size:11px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
  td{padding:13px 16px;font-size:13px;border-bottom:1px solid rgba(21,101,192,0.05);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(21,101,192,0.02);}
  .empty-state{text-align:center;padding:40px;color:var(--muted);}
  .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;}
  .badge-접수중{background:#fff3e0;color:#e65100;} .badge-접수완료{background:#e8f5e9;color:#2e7d32;}
  .badge-입금대기{background:#fce4ec;color:#c2185b;} .badge-입금완료{background:#e3f2fd;color:#1565C0;}
  .badge-진행중{background:rgba(21,101,192,0.1);color:#1565C0;} .badge-완료{background:#e8f5e9;color:#2e7d32;}
  .btn-detail{background:var(--green-dim);border:1px solid rgba(21,101,192,0.2);color:var(--green);padding:5px 12px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;}
  .btn-delete{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#ef4444;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;}
  @media(max-width:768px){th:nth-child(4),td:nth-child(4){display:none;}}
  /* 포트폴리오 관리 */
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .section-header h3{font-size:15px;font-weight:700;}
  .add-btn{background:var(--green);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
  .port-grid{display:flex;flex-wrap:wrap;gap:14px;} .port-card{width:240px;flex-shrink:0;cursor:grab;transition:opacity 0.2s,transform 0.15s;} .port-card.dragging{opacity:0.4;transform:scale(0.97);} .port-card.drag-over{outline:2px dashed var(--green);outline-offset:2px;}
  .port-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .port-thumb{height:90px;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
  .port-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
  .port-body{padding:12px;}
  .port-title{font-size:13px;font-weight:700;margin-bottom:3px;}
  .port-meta{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .port-btns{display:flex;gap:6px;}
  .edit-btn{flex:1;padding:5px;background:var(--green-dim);border:1px solid rgba(21,101,192,0.2);border-radius:5px;font-size:11px;color:var(--green);cursor:pointer;font-family:inherit;font-weight:600;}
  .del-btn{padding:5px 8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:5px;font-size:11px;color:#ef4444;cursor:pointer;font-family:inherit;}
  /* 후기 관리 */
  .review-list{display:flex;flex-direction:column;gap:10px;}
  .review-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;gap:12px;align-items:flex-start;cursor:grab;transition:opacity 0.2s,transform 0.15s;} .review-item.dragging{opacity:0.4;transform:scale(0.98);} .review-item.drag-over{outline:2px dashed var(--green);outline-offset:2px;}
  .review-avatar{width:36px;height:36px;border-radius:50%;background:var(--green-dim);border:1px solid rgba(21,101,192,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--green);font-weight:700;flex-shrink:0;}
  .review-body{flex:1;}
  .review-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
  .review-name{font-size:13px;font-weight:700;}
  .review-role{font-size:11px;color:var(--muted);}
  .review-tag{padding:2px 8px;background:var(--green-dim);color:var(--green);font-size:10px;border-radius:4px;}
  .review-stars{font-size:11px;color:var(--green);}
  .review-text{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:6px;}
  .review-btns{display:flex;gap:6px;}
  /* 모달 공통 */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(13,27,42,0.6);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;padding:32px;}
  .modal-box.wide{max-width:680px;}
  .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:20px;}
  .modal-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .form-row{margin-bottom:14px;}
  .form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 13px;background:rgba(21,101,192,0.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green);}
  .form-row textarea{resize:vertical;min-height:80px;line-height:1.6;}
  .form-btns{display:flex;gap:10px;margin-top:20px;}
  .btn-save{flex:1;padding:12px;background:var(--green);color:#fff;font-weight:700;font-size:14px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;}
  .btn-cancel{padding:12px 20px;background:none;border:1px solid var(--border);color:var(--muted);font-size:13px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .img-preview{width:100%;height:100px;object-fit:cover;border-radius:6px;margin-top:8px;display:none;}
  /* 문의 상세 모달 */
  .progress-bar{display:flex;gap:4px;margin-bottom:20px;}
  .progress-step{flex:1;height:4px;background:var(--border);border-radius:2px;}
  .progress-step.done{background:rgba(21,101,192,0.4);}
  .progress-step.current{background:var(--green);}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
  .info-item label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;}
  .info-item span{font-size:13px;font-weight:500;}
  .content-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;line-height:1.8;margin-bottom:18px;white-space:pre-wrap;}
  .status-section label{font-size:11px;color:var(--muted);display:block;margin-bottom:8px;}
  .status-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .status-btn{padding:7px 14px;background:none;border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);transition:all 0.2s;}
  .status-btn.selected,.status-btn:hover{background:var(--green);color:#fff;border-color:var(--green);}
  .memo-input{width:100%;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;min-height:70px;outline:none;box-sizing:border-box;margin-bottom:14px;line-height:1.6;}
  .memo-input:focus{border-color:var(--green);}
  .save-btn{width:100%;padding:12px;background:var(--green);color:#fff;font-weight:700;font-size:14px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;}
  /* 수동접수 */
  .manual-id-preview{font-size:11px;color:var(--green);font-family:monospace;margin-top:6px;padding:6px 10px;background:var(--green-dim);border-radius:5px;border:1px solid rgba(21,101,192,0.15);}

  #lb{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);align-items:center;justify-content:center;cursor:zoom-out;}
  #lb.open{display:flex;}
  #lb img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;}
  #lb-close{position:absolute;top:20px;right:24px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;}
</style>
</head>

    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">로그인</button>
    <div class="login-error" id="loginError">비밀번호가 틀렸습니다</div>

      <span style="font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;">ADMIN</span>
    </div>
    <div class="top-right">
      <button class="icon-btn primary" onclick="openManual()">✏️ 수동 접수</button>
      <a href="index.html" class="icon-btn">🏠 홈페이지</a>
      <button class="icon-btn" onclick="loadProjects()">🔄 새로고침</button>
      <button class="icon-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="main">
    <div class="stats" id="statsBar"></div>

    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('inquiries',this)">📥 문의 관리</button>
      <button class="admin-tab" onclick="switchTab('portfolio',this)">🖼 작업물 관리</button>
      <button class="admin-tab" onclick="switchTab('store',this)">🛒 판매프로그램 관리</button>
      <button class="admin-tab" onclick="switchTab('reviews',this)">💬 고객 후기 관리</button>
    </div>

    <!-- 문의 패널 -->
    <div id="tab_inquiries" class="tab-panel active">
      <div class="filter-bar">
        <button class="filter-tab active" onclick="filterBy('전체',this)">전체</button>
        <button class="filter-tab" onclick="filterBy('접수중',this)">접수중</button>
        <button class="filter-tab" onclick="filterBy('접수완료',this)">접수완료</button>
        <button class="filter-tab" onclick="filterBy('입금대기',this)">입금대기</button>
        <button class="filter-tab" onclick="filterBy('입금완료',this)">입금완료</button>
        <button class="filter-tab" onclick="filterBy('진행중',this)">진행중</button>
        <button class="filter-tab" onclick="filterBy('완료',this)">완료</button>
        <input class="search-input" placeholder="🔍 이름, 연락처 검색" oninput="searchProjects(this.value)">
      </div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbyxFFyXgvrMHlBNNOU3u0rYSorHiTkdHPJgaGSvKLgdqmIjaKGdE61S2Q96qHkfPoQ/exec';
var ADMIN_PW = 'dev0922';
var STAGES = ['접수중','접수완료','입금대기','입금완료','진행중','완료'];
var allProjects = [], currentFilter = '전체', currentProject = null;

// ── 로그인 ──────────────────────────────────────────────────
function login() {
  var pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadProjects();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ── 탭 전환 ─────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.admin-tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tab_' + name).classList.add('active');
  if (name === 'portfolio') loadPortManage();
  if (name === 'store') loadStoreManage();
  if (name === 'reviews') loadReviewManage();
}

// ── 문의 로드 ────────────────────────────────────────────────
function loadProjects() {
  document.getElementById('projectTable').innerHTML = '<tr><td colspan="7" class="empty-state">불러오는 중...</td></tr>';
  fetch(API_URL + '?action=list&pw=' + encodeURIComponent(ADMIN_PW), { redirect:'follow' })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.result !== 'success') throw new Error(d.message);
      allProjects = d.projects || [];
      renderStats();
      filterBy(currentFilter, null);
    })
    .catch(function(e){
      document.getElementById('projectTable').innerHTML = '<tr><td colspan="7" class="empty-state">불러오기 실패: ' + e.message + '</td></tr>';
    });
}

function renderStats() {
  var counts = {};
  STAGES.forEach(function(s){ counts[s] = 0; });
  allProjects.forEach(function(p){ if (counts[p.상태] !== undefined) counts[p.상태]++; });
  var total = allProjects.length;
  var html = '<div class="stat-card"><div class="stat-n">' + total + '</div><div class="stat-l">전체</div></div>';
  ['접수중','진행중','완료'].forEach(function(s){
    html += '<div class="stat-card"><div class="stat-n">' + (counts[s]||0) + '</div><div class="stat-l">' + s + '</div></div>';
  });
  document.getElementById('statsBar').innerHTML = html;
}

function renderTable(projects) {
  if (!projects.length) {
    document.getElementById('projectTable').innerHTML = '<tr><td colspan="7" class="empty-state">해당 접수가 없습니다.</td></tr>';
    return;
  }
  var html = '';
  projects.forEach(function(p) {
    var idStr = p.접수번호 || '';
    var isKakao = idStr.indexOf('KAKAO-') === 0;
    var idLabel = isKakao
      ? '<span style="font-size:10px;color:#e65100;background:#fff3e0;padding:2px 5px;border-radius:3px;margin-right:4px;">카카오</span>' + idStr.replace('KAKAO-', '')
      : '<span style="font-size:10px;color:var(--green);background:var(--green-dim);padding:2px 5px;border-radius:3px;margin-right:4px;">웹</span>' + idStr.replace('DEVA-', '');
    html += '<tr>';
    html += '<td style="font-family:monospace;font-size:11px;">' + idLabel + '</td>';
    html += '<td><strong>' + (p.이름||'') + '</strong><br><span style="font-size:11px;color:var(--muted)">' + (p.연락처||'') + '</span></td>';
    html += '<td>' + (p.서비스||'') + '</td>';
    html += '<td>' + (p.예산||'') + '</td>';
    html += '<td><span class="badge badge-' + p.상태 + '">' + p.상태 + '</span></td>';
    html += '<td style="font-size:11px;color:var(--muted)">' + ((p.최종수정||'').substring(0,16)) + '</td>';
    html += '<td style="display:flex;gap:6px;"><button class="btn-detail" onclick="openDetail(' + p._rowIdx + ')">상세보기</button></td>';
    html += '</tr>';
  });
  document.getElementById('projectTable').innerHTML = html;
}

function filterBy(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  var filtered = status === '전체' ? allProjects : allProjects.filter(function(p){ return p.상태 === status; });
  renderTable(filtered);
}

function searchProjects(q) {
  q = q.toLowerCase();
  var filtered = allProjects.filter(function(p) {
    return !q || (p.이름||'').includes(q) || (p.연락처||'').includes(q) || (p.접수번호||'').toLowerCase().includes(q);
  });
  if (currentFilter !== '전체') filtered = filtered.filter(function(p){ return p.상태 === currentFilter; });
  renderTable(filtered);
}

// ── 상세 모달 ────────────────────────────────────────────────
function openDetail(rowIdx) {
  var p = allProjects.find(function(x){ return x._rowIdx === rowIdx; });
  if (!p) return;
  currentProject = p;
  document.getElementById('m_id').textContent = p.접수번호;
  document.getElementById('m_name').textContent = p.이름 || '';
  document.getElementById('m_contact').textContent = p.연락처 || '';
  document.getElementById('m_service').textContent = p.서비스 || '';
  document.getElementById('m_budget').textContent = p.예산 || '';
  document.getElementById('m_time').textContent = p.접수시간 || '';
  document.getElementById('m_content').textContent = p.내용 || '';
  document.getElementById('m_memo').value = p.메모 || '';
  var stIdx = STAGES.indexOf(p.상태);
  var progHtml = STAGES.map(function(_, i){
    var cls = i < stIdx ? 'done' : (i === stIdx ? 'current' : '');
    return '<div class="progress-step ' + cls + '"></div>';
  }).join('');
  document.getElementById('m_progress').innerHTML = progHtml;
  document.getElementById('m_status').innerHTML = '<span class="badge badge-' + p.상태 + '">' + p.상태 + '</span>';
  document.getElementById('m_statusBtns').innerHTML = STAGES.map(function(s){
    return '<button class="status-btn' + (s === p.상태 ? ' selected' : '') + '" onclick="selectStatus(\'' + s + '\',this)">' + s + '</button>';
  }).join('');
  document.getElementById('detailModal').style.display = 'flex';
}
function closeDetail() { document.getElementById('detailModal').style.display = 'none'; currentProject = null; }
function selectStatus(s, btn) {
  document.querySelectorAll('.status-btn').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
}
function saveStatus() {
  var sel = document.querySelector('.status-btn.selected');
  if (!sel) { alert('상태를 선택해주세요'); return; }
  var newStatus = sel.textContent;
  var newMemo = document.getElementById('m_memo').value;
  var projectId = currentProject.접수번호;

  // ── 즉시 로컬 반영 (낙관적 업데이트) ──
  var proj = allProjects.find(function(p){ return p.접수번호 === projectId; });
  if (proj) { proj.상태 = newStatus; proj.메모 = newMemo; }
  closeDetail();
  renderTable(allProjects);

  // ── GAS 저장 백그라운드 ──
  fetch(API_URL, {
    method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'updateStatus', pw:ADMIN_PW, projectId:projectId, status:newStatus, memo:newMemo })
  }).catch(function(){ console.warn('상태 저장 실패'); });
}
function deleteFromModal() {
  if (!currentProject) return;
  if (!confirm('[' + currentProject.접수번호 + '] 을(를) 삭제하시겠습니까? 복구 불가합니다.')) return;
  var projectId = currentProject.접수번호;

  // ── 즉시 로컬 반영 ──
  allProjects = allProjects.filter(function(p){ return p.접수번호 !== projectId; });
  closeDetail();
  renderTable(allProjects);

  // ── GAS 삭제 백그라운드 ──
  fetch(API_URL, {
    method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'deleteProject', pw:ADMIN_PW, projectId:projectId })
  }).catch(function(){ console.warn('삭제 실패'); });
}

// ── 수동 접수 ────────────────────────────────────────────────
function genKakaoId() {
  var n = new Date(), p2 = function(n){ return String(n).padStart(2,'0'); };
  return 'KAKAO-' + n.getFullYear() + p2(n.getMonth()+1) + p2(n.getDate()) + '-' + p2(n.getHours()) + p2(n.getMinutes()) + p2(n.getSeconds());
}
function openManual() {
  var id = genKakaoId();
  document.getElementById('mf_idPreview').textContent = '접수번호: ' + id;

function loadPortManage() {

function restoreLocalImages(items) {

  return items.map(function(p) {

      return Object.assign({}, p, { imgUrl: '' });
    }

  });

function setLocalStore(d) { localStorage.setItem('devora_store', JSON.stringify(d)); }

function isStoreDataCorrupted(items) {
  // 컬럼 밀림 감지: name 필드가 카테고리값이거나 features에 __IMG__가 들어있으면 오염된 데이터

  return items.some(function(p) {
    return catValues.indexOf(p.name) !== -1 || (p.features && p.features === '__IMG__');
  });
}

  // 로컬 캐시 확인 (오염된 데이터면 무시)
  var cached = getLocalStore();
  if (cached && isStoreDataCorrupted(cached)) {
    localStorage.removeItem('devora_store');
    cached = null;
  }
  STORE_DATA = cached || DEFAULT_STORE.slice();
  renderStoreManage();

  // GAS에서 최신 데이터 로드
  fetch(API_URL + '?action=getStore', { redirect:'follow' })
    .then(function(r){ return r.text(); })
    .then(function(t){
      try {
        var d = JSON.parse(t);
        if (d.result === 'success') {
          if (d.items && d.items.length && !isStoreDataCorrupted(d.items)) {
            // 정상 데이터면 사용
            STORE_DATA = d.items;
          } else {
            // GAS가 비어있거나 오염됐으면 DEFAULT로 초기화 + GAS에 저장
            STORE_DATA = DEFAULT_STORE.slice();
            DEFAULT_STORE.forEach(function(item) {
              fetch(API_URL, {
                method:'POST', mode:'no-cors',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ action:'saveStore', pw:ADMIN_PW, item:item })
              }).catch(function(){});
            });
          }
          setLocalStore(STORE_DATA);
          renderStoreManage();
        }
      } catch(e) {}
    }).catch(function(){});
}

function renderStoreManage() {
  var badge = document.getElementById('storeBadge');
  if (badge) badge.textContent = '(' + STORE_DATA.length + '개)';
  if (!STORE_DATA.length) {
    document.getElementById('storeGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">프로그램이 없습니다. 추가해보세요!</div>';
    return;
  }
  var GRAD = { '웹 형태':'linear-gradient(135deg,#4a9eff,#1e5fc7)', '앱 형태':'linear-gradient(135deg,#63b3ff,#2979d4)', '윈도우 프로그램':'linear-gradient(135deg,#e2effc,#c8dff7)', 'macOS 프로그램':'linear-gradient(135deg,#ddeaf8,#bdd4f0)', '자동화 / 봇':'linear-gradient(135deg,#4a9eff,#1e5fc7)', '기타':'linear-gradient(135deg,#e2effc,#ddeaf8)' };
  document.getElementById('storeGrid').innerHTML = STORE_DATA.map(function(p, idx) {
    var icon = STORE_CAT_ICON[p.cat] || '🛠';
    // imgUrl이 __IMG__ 마커면 아직 로드 안 된 것 — 빈 이미지 처리
    var imgUrl = (p.imgUrl && p.imgUrl !== '__IMG__') ? p.imgUrl : '';
    var thumbStyle = imgUrl ? 'background:#e8eef7;' : 'background:' + (GRAD[p.cat]||GRAD['기타']) + ';';
    var thumbContent = imgUrl
      ? '<img src="' + imgUrl + '" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" />'
      : '<span style="font-size:28px;position:relative;z-index:1;">' + icon + '</span>';
    return '<div class="port-card" draggable="true" data-store-id="' + p.id + '" data-idx="' + idx + '">' +
      '<div class="port-thumb" style="' + thumbStyle + '">' + thumbContent +
        '<span style="position:absolute;top:6px;left:6px;background:rgba(255,255,255,0.92);border-radius:3px;font-size:10px;color:#1565C0;font-weight:600;padding:2px 6px;z-index:2;">' + (p.cat||'') + '</span>' +
        '<span style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.18);border-radius:3px;font-size:10px;color:#fff;padding:2px 5px;z-index:2;cursor:grab;">⠿</span>' +
      '</div>' +
      '<div class="port-body">' +
        '<div class="port-title">' + p.name + '</div>' +
        '<div class="port-btns">' +
          '<button class="edit-btn" data-store-id="' + p.id + '" onclick="openEditStore(this.dataset.storeId)">✏️ 수정</button>' +
          '<button class="del-btn" data-store-id="' + p.id + '" onclick="deleteStore(this.dataset.storeId)">🗑</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
  initStoreDrag();
}

function openEditStore(id) {
  var p = id ? STORE_DATA.find(function(x){ return x.id === id; }) : null;
  document.getElementById('editStoreTitle').textContent = p ? '✏️ 프로그램 수정' : '✏️ 새 프로그램 추가';
  document.getElementById('es_id').value       = p ? p.id : '';
  document.getElementById('es_name').value     = p ? p.name : '';
  document.getElementById('es_cat').value      = p ? (p.cat||'윈도우 프로그램') : '윈도우 프로그램';
  document.getElementById('es_desc').value     = p ? p.desc : '';
  document.getElementById('es_features').value = p ? (Array.isArray(p.features) ? p.features.join(', ') : (p.features||'')) : '';
  var imgUrl = (p && p.imgUrl) ? p.imgUrl : '';
  document.getElementById('es_imgUrl').value   = imgUrl;
  document.getElementById('es_imgPreview').style.display = 'none';
  if (imgUrl) previewStoreImg(imgUrl);
  document.getElementById('editStoreModal').style.display = 'flex';
}
function closeEditStore() { document.getElementById('editStoreModal').style.display = 'none'; }

function previewStoreImg(url) {
  var img = document.getElementById('es_imgPreview');
  if (url) { img.src = url; img.style.display = 'block'; } else { img.style.display = 'none'; }
}

function handleStoreImgUpload(input) {
  var file = input.files[0];
  if (!file) return;
  var statusEl = document.getElementById('esImgStatus');
  if (!statusEl) {
    statusEl = document.createElement('div');
    statusEl.id = 'esImgStatus';
    statusEl.style.cssText = 'font-size:11px;margin-top:6px;padding:6px 10px;border-radius:4px;';
    input.parentNode.parentNode.parentNode.appendChild(statusEl);
  }
  statusEl.style.background = 'rgba(21,101,192,0.08)';
  statusEl.style.color = '#1565C0';
  statusEl.textContent = '⏳ 이미지 압축 중...';
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var MAX_W = 900, MAX_H = 600;
      var ratio = Math.min(MAX_W / img.width, MAX_H / img.height, 1);
      var canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      var quality = 0.88, compressed;
      do { compressed = canvas.toDataURL('image/jpeg', quality); quality -= 0.05; }
      while (compressed.length > 49000 && quality > 0.3);
      document.getElementById('es_imgUrl').value = compressed;
      previewStoreImg(compressed);
      statusEl.style.background = 'rgba(16,185,129,0.08)';
      statusEl.style.color = '#059669';
      statusEl.textContent = '✅ 압축 완료 (' + Math.round(compressed.length * 0.75 / 1024) + 'KB)';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveStore() {
  var name = document.getElementById('es_name').value.trim();
  if (!name) { alert('프로그램 이름을 입력해주세요.'); return; }
  var id = document.getElementById('es_id').value || ('s' + Date.now());
  var item = {
    id:       id,
    name:     name,
    cat:      document.getElementById('es_cat').value,
    desc:     document.getElementById('es_desc').value.trim(),
    features: document.getElementById('es_features').value.trim(),
    imgUrl:   document.getElementById('es_imgUrl').value.trim()
  };
  var idx = STORE_DATA.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) STORE_DATA[idx] = item; else STORE_DATA.push(item);
  setLocalStore(STORE_DATA);
  fetch(API_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'saveStore', pw:ADMIN_PW, item:item })
  }).catch(function(){});
  closeEditStore();
  renderStoreManage();
}

function deleteStore(id) {
  if (!confirm('이 프로그램을 삭제할까요?')) return;
  STORE_DATA = STORE_DATA.filter(function(p){ return p.id !== id; });
  setLocalStore(STORE_DATA);
  fetch(API_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'deleteStore', pw:ADMIN_PW, id:id })
  }).catch(function(){});
  renderStoreManage();
}

// ── 이미지 파일 업로드 ────────────────────────────────────────
// Canvas로 압축 → base64를 Sheets에 직접 저장 (외부 서비스 불필요)
// Sheets 셀 한도(50,000자) 맞추기 위해 400×300, 품질 65%로 리사이즈
function handleImgUpload(input) {
  var file = input.files[0];
  if (!file) return;

  var statusEl = document.getElementById('imgUploadStatus');
  if (!statusEl) {
    statusEl = document.createElement('div');
    statusEl.id = 'imgUploadStatus';
    statusEl.style.cssText = 'font-size:11px;margin-top:6px;padding:6px 10px;border-radius:4px;';
    input.parentNode.insertBefore(statusEl, input.nextSibling);
  }

  statusEl.style.background = 'rgba(21,101,192,0.08)';
  statusEl.style.color = '#1565C0';
  statusEl.textContent = '⏳ 이미지 압축 중...';

  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      // Canvas로 리사이즈 압축 (Sheets 셀 한도 50,000자 내로)
      var MAX_W = 900, MAX_H = 600;
      var ratio = Math.min(MAX_W / img.width, MAX_H / img.height, 1);
      var w = Math.round(img.width * ratio);
      var h = Math.round(img.height * ratio);

      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      // 품질을 낮춰가며 50,000자 이하가 될 때까지 압축
      var quality = 0.88;
      var compressed;
      do {
        compressed = canvas.toDataURL('image/jpeg', quality);
        quality -= 0.05;
      } while (compressed.length > 49000 && quality > 0.3);

      if (compressed.length > 49000) {
        // 그래도 크면 더 작게 리사이즈
        canvas.width = Math.round(w * 0.6);
        canvas.height = Math.round(h * 0.6);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        compressed = canvas.toDataURL('image/jpeg', 0.5);
      }

      document.getElementById('ep_imgUrl').value = compressed;
      previewImg(compressed);

      var kb = Math.round(compressed.length * 0.75 / 1024);
      statusEl.style.background = 'rgba(16,185,129,0.08)';
      statusEl.style.color = '#059669';
      statusEl.textContent = '✅ 압축 완료 (' + kb + 'KB) — 저장 시 모든 기기에서 표시됩니다';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── 모달 overlay mousedown 닫기 (버블링 방지) ────────────────
(function() {
  var overlayIds = ['editPortModal','editReviewModal','editStoreModal','detailModal','manualModal'];
  overlayIds.forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var _mouseDownTarget = null;
    el.addEventListener('mousedown', function(e) { _mouseDownTarget = e.target; });
    el.addEventListener('mouseup', function(e) {
      if (_mouseDownTarget === el && e.target === el) {
        if (id === 'editPortModal') closeEditPort();
        else if (id === 'editReviewModal') closeEditReview();
        else if (id === 'detailModal') closeDetail();
        else if (id === 'manualModal') closeManual();
      }
      _mouseDownTarget = null;
    });
  });
})();

// ── 작업물 드래그 앤 드롭 ────────────────────────────────────
var _portDragId = null;
function initPortDrag() {
  var cards = document.querySelectorAll('#portGrid .port-card');
  cards.forEach(function(card) {
    card.addEventListener('dragstart', function(e) {
      _portDragId = this.dataset.portId;
      setTimeout(function() { card.classList.add('dragging'); }, 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      document.querySelectorAll('#portGrid .port-card').forEach(function(c){ c.classList.remove('drag-over'); });
    });
    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('#portGrid .port-card').forEach(function(c){ c.classList.remove('drag-over'); });
      if (this.dataset.portId !== _portDragId) this.classList.add('drag-over');
    });
    card.addEventListener('drop', function(e) {
      e.preventDefault();
      var fromId = _portDragId;
      var toId = this.dataset.portId;
      if (!fromId || fromId === toId) return;
      var fromIdx = PORT_DATA.findIndex(function(p){ return p.id === fromId; });
      var toIdx = PORT_DATA.findIndex(function(p){ return p.id === toId; });
      if (fromIdx < 0 || toIdx < 0) return;
      var item = PORT_DATA.splice(fromIdx, 1)[0];
      PORT_DATA.splice(toIdx, 0, item);
      setLocalPort(PORT_DATA);
      saveAllPortToSheets();
      renderPortManage();
    });
  });
}

// ── 후기 드래그 앤 드롭 ─────────────────────────────────────
var _revDragId = null;
function initReviewDrag() {
  var items = document.querySelectorAll('#reviewList .review-item');
  items.forEach(function(item) {
    item.setAttribute('draggable', 'true');
    item.addEventListener('dragstart', function(e) {
      _revDragId = this.dataset.revId;
      setTimeout(function() { item.classList.add('dragging'); }, 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      document.querySelectorAll('#reviewList .review-item').forEach(function(r){ r.classList.remove('drag-over'); });
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      document.querySelectorAll('#reviewList .review-item').forEach(function(r){ r.classList.remove('drag-over'); });
      if (this.dataset.revId !== _revDragId) this.classList.add('drag-over');
    });
    item.addEventListener('drop', function(e) {
      e.preventDefault();
      var fromId = _revDragId;
      var toId = this.dataset.revId;
      if (!fromId || fromId === toId) return;
      var fromIdx = REVIEW_DATA.findIndex(function(r){ return r.id === fromId; });
      var toIdx = REVIEW_DATA.findIndex(function(r){ return r.id === toId; });
      if (fromIdx < 0 || toIdx < 0) return;
      var item2 = REVIEW_DATA.splice(fromIdx, 1)[0];
      REVIEW_DATA.splice(toIdx, 0, item2);
      setLocalReviews(REVIEW_DATA);
      saveAllReviewToSheets();
      renderReviewManage();
    });
  });
}

// ── 전체 순서 Sheets 저장 ────────────────────────────────────
function saveAllPortToSheets() {
  var items = PORT_DATA.map(function(p) {
    var si = JSON.parse(JSON.stringify(p));
    if (si.imgUrl && si.imgUrl.startsWith('data:')) si.imgUrl = '';
    return si;
  });
  var params = 'action=saveAllPortfolio&pw=' + encodeURIComponent(ADMIN_PW) + '&items=' + encodeURIComponent(JSON.stringify(items));
  fetch(API_URL + '?' + params, { redirect:'follow' })
    .then(function(r){ return r.text(); })
    .then(function(t){ console.log('✅ 포트폴리오 순서 저장:', t.substring(0,60)); })
    .catch(function(e){ console.warn('순서 저장 실패:', e); });
}
function saveAllReviewToSheets() {
  var params = 'action=saveAllReviews&pw=' + encodeURIComponent(ADMIN_PW) + '&items=' + encodeURIComponent(JSON.stringify(REVIEW_DATA));
  fetch(API_URL + '?' + params, { redirect:'follow' })
    .then(function(r){ return r.text(); })
    .then(function(t){ console.log('✅ 후기 순서 저장:', t.substring(0,60)); })
    .catch(function(e){ console.warn('순서 저장 실패:', e); });
}

// ── 판매프로그램 드래그 앤 드롭 ──────────────────────────────

function initStoreDrag() {

    card.addEventListener('dragstart', function(e) {
      _storeDragId = this.dataset.storeId;

    });

      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';

      if (this.dataset.storeId !== _storeDragId) this.classList.add('drag-over');
    });
    card.addEventListener('drop', function(e) {
      e.preventDefault();
      var fromId = _storeDragId;
      var toId = this.dataset.storeId;
      if (!fromId || fromId === toId) return;
      var fromIdx = STORE_DATA.findIndex(function(p){ return p.id === fromId; });
      var toIdx = STORE_DATA.findIndex(function(p){ return p.id === toId; });
      if (fromIdx < 0 || toIdx < 0) return;
      var item = STORE_DATA.splice(fromIdx, 1)[0];
      STORE_DATA.splice(toIdx, 0, item);
      setLocalStore(STORE_DATA);
      saveAllStoreToSheets();

  });
}

function saveAllStoreToSheets() {
  // 순서 저장: 이미지는 POST body가 너무 커질 수 있으므로 imgUrl은 제외하고 순서만 저장
  // 실제 이미지는 각 항목 saveStore 때 이미 저장되어 있음
  var items = STORE_DATA.map(function(p) {
    var si = JSON.parse(JSON.stringify(p));
    if (si.imgUrl && si.imgUrl.startsWith('data:')) si.imgUrl = '__IMG__';
    return si;
  });
  fetch(API_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'saveAllStore', pw: ADMIN_PW, items: items })
  }).catch(function(e){ console.warn('스토어 순서 저장 실패:', e); });
}
